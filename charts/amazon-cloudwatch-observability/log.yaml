                operator: NotIn
                values:
                  - fargate
  # hostNetwork: true
  config: "{\"agent\":{\"region\":\"us-east-1\"},\"logs\":{\"metrics_collected\":{\"kubernetes\":{\"cluster_name\":\"cloudwatchagent-ta-dev\",\"enhanced_container_insights\":false}}}}"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 128Mi
  volumeMounts:
  - mountPath: /rootfs
    name: rootfs
    readOnly: true
  - mountPath: /var/run/docker.sock
