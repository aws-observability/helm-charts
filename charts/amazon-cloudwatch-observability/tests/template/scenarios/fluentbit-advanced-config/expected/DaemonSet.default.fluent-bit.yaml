apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    k8s-app: fluent-bit
    kubernetes.io/cluster-service: 'true'
    version: v1
  name: fluent-bit
  namespace: default
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  template:
    metadata:
      annotations:
        checksum/config: ff3e52c503ad45797bb6d3935c759a76577826f054a075632736ce976f337b85
      labels:
        k8s-app: fluent-bit
        kubernetes.io/cluster-service: 'true'
        version: v1
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                - fargate
      containers:
      - env:
        - name: AWS_REGION
          value: us-west-2
        - name: CLUSTER_NAME
          value: test-cluster
        - name: READ_FROM_HEAD
          value: 'Off'
        - name: READ_FROM_TAIL
          value: 'On'
        - name: HOST_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: CI_VERSION
          value: k8s/1.3.17
        image: ((RE:public\.ecr\.aws/aws\-observability/aws\-for\-fluent\-bit:.+))
        imagePullPolicy: Always
        name: fluent-bit
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 400m
            memory: 250Mi
        volumeMounts:
        - mountPath: /var/fluent-bit/state
          name: fluentbitstate
        - mountPath: /var/log
          name: varlog
          readOnly: true
        - mountPath: /var/lib/docker/containers
          name: varlibdockercontainers
          readOnly: true
        - mountPath: /fluent-bit/etc/
          name: fluent-bit-config
        - mountPath: /run/log/journal
          name: runlogjournal
          readOnly: true
        - mountPath: /var/log/dmesg
          name: dmesg
          readOnly: true
        - mountPath: /etc/amazon-cloudwatch-observability-agent-client-cert
          name: agentclienttls
          readOnly: true
        - mountPath: /etc/amazon-cloudwatch-observability-agent-server-cert
          name: agentservertls
          readOnly: true
      dnsPolicy: ClusterFirstWithHostNet
      hostNetwork: true
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-node-critical
      serviceAccountName: cloudwatch-agent
      terminationGracePeriodSeconds: 10
      tolerations:
      - operator: Exists
      volumes:
      - hostPath:
          path: /var/fluent-bit/state
        name: fluentbitstate
      - hostPath:
          path: /var/log
        name: varlog
      - hostPath:
          path: /var/lib/docker/containers
        name: varlibdockercontainers
      - configMap:
          name: fluent-bit-config
        name: fluent-bit-config
      - hostPath:
          path: /run/log/journal
        name: runlogjournal
      - hostPath:
          path: /var/log/dmesg
        name: dmesg
      - name: agentclienttls
        secret:
          items:
          - key: tls.crt
            path: client.crt
          - key: tls.key
            path: client.key
          secretName: amazon-cloudwatch-observability-agent-client-cert
      - name: agentservertls
        secret:
          items:
          - key: ca.crt
            path: tls-ca.crt
          secretName: amazon-cloudwatch-observability-agent-server-cert
  updateStrategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 5%
    type: RollingUpdate
