apiVersion: v1
data:
  application-log.conf: '# disabled by override

    '
  custom-routing.conf: "[INPUT]\n    Name                tail\n    Tag                 application.*\n    Path                /var/log/containers/*.log\n    multiline.parser    docker, cri\n    DB                  /var/fluent-bit/state/flb_container.db\n    storage.type        filesystem\n    Read_from_Head      ${READ_FROM_HEAD}\n\n[FILTER]\n    Name                modify\n    Match               application.*\n    Add                 cluster_id test-cluster-id\n\n[FILTER]\n    Name                 rewrite_tag\n    Match                application.*\n    Rule                 $log_processed['_aws']['CloudWatchMetrics'][0]['Namespace'] .* emf.$TAG false\n    Emitter_Name         re_emitted_emf_logs\n    Emitter_Storage.type filesystem\n\n[OUTPUT]\n    Name                cloudwatch_logs\n    Match               emf.*\n    region              ${AWS_REGION}\n    log_group_name      /aws/containerinsights/${CLUSTER_NAME}/prometheus\n    log_stream_prefix   ${HOST_NAME}-\n    auto_create_group   true\n    log_retention_days  3653\n    log_format          json/emf\n    Retry_Limit         False\n"
  dataplane-log.conf: "[INPUT]\n  Name                systemd\n  Tag                 dataplane.systemd.*\n  Systemd_Filter      _SYSTEMD_UNIT=docker.service\n  Systemd_Filter      _SYSTEMD_UNIT=containerd.service\n  Systemd_Filter      _SYSTEMD_UNIT=kubelet.service\n  DB                  /var/fluent-bit/state/systemd.db\n  Path                /var/log/journal\n  Read_From_Tail      ${READ_FROM_TAIL}\n\n[INPUT]\n  Name                tail\n  Tag                 dataplane.tail.*\n  Path                /var/log/containers/aws-node*, /var/log/containers/kube-proxy*\n  multiline.parser    docker, cri\n  DB                  /var/fluent-bit/state/flb_dataplane_tail.db\n  Mem_Buf_Limit       50MB\n  Skip_Long_Lines     On\n  Refresh_Interval    10\n  Rotate_Wait         30\n  storage.type        filesystem\n  Read_from_Head      ${READ_FROM_HEAD}\n\n[FILTER]\n  Name                modify\n  Match               dataplane.systemd.*\n  Rename              _HOSTNAME                   hostname\n  Rename              _SYSTEMD_UNIT               systemd_unit\n  Rename              MESSAGE                     message\n  Remove_regex        ^((?!hostname|systemd_unit|message).)*$\n\n[FILTER]\n  Name                aws\n  Match               dataplane.*\n  imds_version        v2\n\n[OUTPUT]\n  Name                cloudwatch_logs\n  Match               dataplane.*\n  region              ${AWS_REGION}\n  log_group_name      /aws/containerinsights/${CLUSTER_NAME}/dataplane\n  log_stream_prefix   ${HOST_NAME}-\n  auto_create_group   true\n  extra_user_agent    container-insights\n"
  fluent-bit.conf: "[SERVICE]\n    Flush                     5\n    Grace                     30\n    Log_Level                 info\n    Daemon                    off\n    scheduler.base            15\n    scheduler.cap             300\n    Parsers_File              parsers.conf\n    storage.path              /var/fluent-bit/state/flb-storage/\n    storage.metrics           on\n    HTTP_Server               On\n    HTTP_Port                 2020\n\n@INCLUDE application-log.conf\n@INCLUDE custom-routing.conf\n@INCLUDE dataplane-log.conf\n@INCLUDE host-log.conf\n"
  host-log.conf: "[INPUT]\n  Name                systemd\n  Tag                 host.dmesg\n  Systemd_Filter      _TRANSPORT=kernel\n  DB                  /var/fluent-bit/state/flb_dmesg.db\n  Path                /var/log/journal\n  Read_From_Tail      ${READ_FROM_TAIL}\n\n[INPUT]\n  Name                systemd\n  Tag                 host.messages\n  Systemd_Filter      PRIORITY=0\n  Systemd_Filter      PRIORITY=1\n  Systemd_Filter      PRIORITY=2\n  Systemd_Filter      PRIORITY=3\n  Systemd_Filter      PRIORITY=4\n  Systemd_Filter      PRIORITY=5\n  Systemd_Filter      PRIORITY=6\n  DB                  /var/fluent-bit/state/flb_messages.db\n  Path                /var/log/journal\n  Read_From_Tail      ${READ_FROM_TAIL}\n\n[INPUT]\n  Name                systemd\n  Tag                 host.secure\n  Systemd_Filter      SYSLOG_FACILITY=10\n  DB                  /var/fluent-bit/state/flb_secure.db\n  Path                /var/log/journal\n  Read_From_Tail      ${READ_FROM_TAIL}\n\n[FILTER]\n  Name                aws\n  Match               host.*\n  imds_version        v2\n\n[FILTER]\n  Name                grep\n  Match               host.messages\n  Exclude             SYSLOG_FACILITY /^(2|9|10)$/\n\n[FILTER]\n  Name                modify\n  Match               host.*\n  Rename             _HOSTNAME host\n  Rename             MESSAGE message\n  Rename             SYSLOG_IDENTIFIER ident\n  Rename             SYSLOG_PID pid\n  Remove_regex       [A-Z]\n\n[OUTPUT]\n  Name                cloudwatch_logs\n  Match               host.*\n  region              ${AWS_REGION}\n  log_group_name      /aws/containerinsights/${CLUSTER_NAME}/host\n  log_stream_prefix   ${HOST_NAME}.\n  auto_create_group   true\n  extra_user_agent    container-insights\n"
  parsers.conf: "[PARSER]\n    Name                custom_syslog\n    Format              regex\n    Regex               ^(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<message>.*)$\n    Time_Key            time\n    Time_Format         %b %d %H:%M:%S\n"
kind: ConfigMap
metadata:
  labels:
    k8s-app: fluent-bit
  name: fluent-bit-config
  namespace: default
