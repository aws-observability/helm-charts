apiVersion: v1
data:
  application-log.conf: "[INPUT]\n  Name                tail\n  Tag                 application.*\n  Exclude_Path        C:\\\\var\\\\log\\\\containers\\\\fluent-bit*, C:\\\\var\\\\log\\\\containers\\\\cloudwatch-agent*\n  Path                C:\\\\var\\\\log\\\\containers\\\\*.log\n  Parser              docker\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_container.db\n  Mem_Buf_Limit       50MB\n  Skip_Long_Lines     On\n  Rotate_Wait         30\n  Refresh_Interval    10\n  Read_from_Head      ${READ_FROM_HEAD}\n\n[INPUT]\n  Name                tail\n  Tag                 application.*\n  Path                C:\\\\var\\\\log\\\\containers\\\\fluent-bit*\n  Parser              docker\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_log.db\n  Mem_Buf_Limit       5MB\n  Skip_Long_Lines     On\n  Rotate_Wait         30\n  Refresh_Interval    10\n  Read_from_Head      ${READ_FROM_HEAD}\n\n[INPUT]\n  Name                tail\n  Tag                 application.*\n  Path                C:\\\\var\\\\log\\\\containers\\\\cloudwatch-agent*\n  Parser              docker\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_cwagent.db\n  Mem_Buf_Limit       5MB\n  Skip_Long_Lines     On\n  Rotate_Wait         30\n  Refresh_Interval    10\n  Read_from_Head      ${READ_FROM_HEAD}\n\n[FILTER]\n  Name                aws\n  Match               application.*\n  az                  false\n  ec2_instance_id     false\n\n[FILTER]\n  Name                kubernetes\n  Match               application.*\n  Kube_URL            https://kubernetes.default.svc:443\n  Kube_Tag_Prefix     application.C.var.log.containers.\n  Merge_Log           On\n  Merge_Log_Key       log_processed\n  K8S-Logging.Parser  On\n  K8S-Logging.Exclude Off\n  Labels              Off\n  Annotations         Off\n  Use_Kubelet         On\n  Kubelet_Port        10250\n  Buffer_Size         0\n\n[OUTPUT]\n  Name                cloudwatch_logs\n  Match               application.*\n  region              ${AWS_REGION}\n  log_group_name      /aws/containerinsights/${CLUSTER_NAME}/application\n  log_stream_prefix   ${HOST_NAME}-\n  auto_create_group   true\n  extra_user_agent    container-insights\n"
  dataplane-log.conf: "[INPUT]\n  Name                tail\n  Tag                 dataplane.tail.*\n  Path                C:\\\\ProgramData\\\\containerd\\\\root\\\\*.log, C:\\\\ProgramData\\\\Amazon\\\\EKS\\\\logs\\\\*.log\n  Parser              dataplane_firstline\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_dataplane_tail.db\n  Mem_Buf_Limit       5MB\n  Skip_Long_Lines     On\n  Rotate_Wait         30\n  Refresh_Interval    10\n  Read_from_Head      ${READ_FROM_HEAD}\n\n[INPUT]\n  Name                tail\n  Tag                 dataplane.tail.C.ProgramData.Amazon.EKS.logs.vpc-bridge\n  Path                C:\\\\ProgramData\\\\Amazon\\\\EKS\\\\logs\\\\*.log.*\n  Path_Key            file_name\n  Parser              dataplane_firstline\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_dataplane_cni_tail.db\n  Mem_Buf_Limit       5MB\n  Skip_Long_Lines     On\n  Rotate_Wait         30\n  Refresh_Interval    10\n  Read_from_Head      ${READ_FROM_HEAD}\n\n[INPUT]\n  Name                winlog\n  Channels            EKS\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_eks_winlog.db\n  Interval_Sec        60\n\n[FILTER]\n  Name                aws\n  Match               dataplane.*\n  imds_version        v2\n\n[FILTER]\n  Name                aws\n  Match               winlog.*\n  imds_version        v2\n\n[OUTPUT]\n  Name                cloudwatch_logs\n  Match               dataplane.*\n  region              ${AWS_REGION}\n  log_group_name      /aws/containerinsights/${CLUSTER_NAME}/dataplane\n  log_stream_prefix   ${HOST_NAME}-\n  auto_create_group   true\n  extra_user_agent    container-insights\n\n[OUTPUT]\n  Name                cloudwatch_logs\n  Match               winlog.*\n  region              ${AWS_REGION}\n  log_group_name      /aws/containerinsights/${CLUSTER_NAME}/dataplane\n  log_stream_name     ${HOST_NAME}.windows.kubelet.kubeproxy.service\n  auto_create_group   true\n  extra_user_agent    container-insights\n"
  fluent-bit.conf: "[ SERVICE ]\n  Flush                       5\n  Log_Level                   error\n  Daemon                      off\n  net.dns.resolver            LEGACY\n  Parsers_File                parsers.conf\n\n  @INCLUDE application-log.conf\n  @INCLUDE dataplane-log.conf\n  @INCLUDE host-log.conf\n\n@INCLUDE application-log.conf\n@INCLUDE dataplane-log.conf\n@INCLUDE host-log.conf\n"
  host-log.conf: "[INPUT]\n  Name                winlog\n  Channels            System\n  DB                  C:\\\\var\\\\fluent-bit\\\\state\\\\flb_system_winlog.db\n  Interval_Sec        60\n\n[FILTER]\n  Name                aws\n  Match               winlog.*\n  imds_version        v2\n\n[OUTPUT]\n  Name                cloudwatch_logs\n  Match               winlog.*\n  region              ${AWS_REGION}\n  log_group_name      /aws/containerinsights/${CLUSTER_NAME}/host\n  log_stream_name     ${HOST_NAME}.windows.system.events\n  auto_create_group   true\n  extra_user_agent    container-insights\n"
  parsers.conf: "[PARSER]\n  Name                docker\n  Format              json\n  Time_Key            time\n  Time_Format         %b %d %H:%M:%S\n\n[PARSER]\n  Name                container_firstline\n  Format              regex\n  Regex               (?<log>(?<=\"log\":\")\\S(?!\\.).*?)(?<!\\\\)\".*(?<stream>(?<=\"stream\":\").*?)\".*(?<time>\\d{4}-\\d{1,2}-\\d{1,2}T\\d{2}:\\d{2}:\\d{2}\\.\\w*).*(?=})\n  Time_Key            time\n  Time_Format         %Y-%m-%dT%H:%M:%S.%LZ\n\n[PARSER]\n  Name                dataplane_firstline\n  Format              regex\n  Regex               (?<log>(?<=\"log\":\")\\S(?!\\.).*?)(?<!\\\\)\".*(?<stream>(?<=\"stream\":\").*?)\".*(?<time>\\d{4}-\\d{1,2}-\\d{1,2}T\\d{2}:\\d{2}:\\d{2}\\.\\w*).*(?=})\n  Time_Key            time\n  Time_Format         %Y-%m-%dT%H:%M:%S.%LZ\n"
kind: ConfigMap
metadata:
  labels:
    k8s-app: fluent-bit
  name: fluent-bit-windows-config
  namespace: default
