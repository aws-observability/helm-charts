apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  labels:
    app.kubernetes.io/instance: test-release
    app.kubernetes.io/managed-by: amazon-cloudwatch-agent-operator
    app.kubernetes.io/name: amazon-cloudwatch-observability
    app.kubernetes.io/version: ((ANY))
  name: amazon-cloudwatch-observability-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: ((BASE64))
    service:
      name: amazon-cloudwatch-observability-webhook-service
      namespace: default
      path: /mutate-cloudwatch-aws-amazon-com-v1alpha1-instrumentation
  failurePolicy: Ignore
  name: minstrumentation.kb.io
  namespaceSelector: {}
  rules:
  - apiGroups:
    - cloudwatch.aws.amazon.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - instrumentations
  sideEffects: None
  timeoutSeconds: 10
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: ((BASE64))
    service:
      name: amazon-cloudwatch-observability-webhook-service
      namespace: default
      path: /mutate-cloudwatch-aws-amazon-com-v1alpha1-amazoncloudwatchagent
  failurePolicy: Ignore
  name: mamazoncloudwatchagent.kb.io
  namespaceSelector: {}
  rules:
  - apiGroups:
    - cloudwatch.aws.amazon.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - amazoncloudwatchagents
  sideEffects: None
  timeoutSeconds: 10
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: ((BASE64))
    service:
      name: amazon-cloudwatch-observability-webhook-service
      namespace: default
      path: /mutate-v1-pod
  failurePolicy: Ignore
  name: mpod.kb.io
  namespaceSelector: {}
  rules:
  - apiGroups:
    - ''
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - pods
  sideEffects: None
  timeoutSeconds: 10
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: ((BASE64))
    service:
      name: amazon-cloudwatch-observability-webhook-service
      namespace: default
      path: /mutate-v1-namespace
  failurePolicy: Ignore
  name: mnamespace.kb.io
  namespaceSelector: {}
  rules:
  - apiGroups:
    - ''
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - namespaces
  sideEffects: None
  timeoutSeconds: 10
- admissionReviewVersions:
  - v1
  clientConfig:
    caBundle: ((BASE64))
    service:
      name: amazon-cloudwatch-observability-webhook-service
      namespace: default
      path: /mutate-v1-workload
  failurePolicy: Ignore
  name: mworkload.kb.io
  namespaceSelector: {}
  rules:
  - apiGroups:
    - apps
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - daemonsets
    - deployments
    - statefulsets
  sideEffects: None
  timeoutSeconds: 10
