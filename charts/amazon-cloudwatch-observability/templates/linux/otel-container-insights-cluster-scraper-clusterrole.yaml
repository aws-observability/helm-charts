{{- if .Values.otelContainerInsights.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ template "cloudwatch-agent.name" . }}-cluster-scraper-role
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "namespaces", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "cloudwatch-agent.name" . }}-cluster-scraper-rolebinding
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "cloudwatch-agent.name" . }}-cluster-scraper-role
subjects:
  - kind: ServiceAccount
    name: {{ template "cloudwatch-agent.name" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
