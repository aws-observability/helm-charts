{{- if .Values.otelContainerInsights.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "node-exporter.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "node-exporter.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
    k8s-app: {{ include "node-exporter.name" . }}
spec:
  selector:
    matchLabels:
      k8s-app: {{ include "node-exporter.name" . }}
  template:
    metadata:
      labels:
        k8s-app: {{ include "node-exporter.name" . }}
    spec:
      serviceAccountName: {{ template "node-exporter.serviceAccountName" . }}
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: eks.amazonaws.com/compute-type
                    operator: NotIn
                    values:
                      - fargate
      {{- dict "component" .Values.nodeExporter "context" . | include "amazon-cloudwatch-observability.common.tolerations" | nindent 6 }}
      containers:
        - name: node-exporter
          image: {{ template "node-exporter.image" . }}
          args:
            - --path.rootfs=/host/root
            - --path.sysfs=/host/sys
            - --path.procfs=/host/proc
            - --web.listen-address=:9487
            - --web.config.file=/etc/node-exporter/web.yml
          ports:
            - name: metrics
              containerPort: 9487
              hostPort: 9487
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 100Mi
            requests:
              cpu: 50m
              memory: 30Mi
          volumeMounts:
            - name: rootfs
              mountPath: /host/root
              readOnly: true
              mountPropagation: HostToContainer
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: nodeexportertls
              mountPath: /etc/node-exporter-cert
              readOnly: true
            - name: web-config
              mountPath: /etc/node-exporter
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: sys
          hostPath:
            path: /sys
        - name: proc
          hostPath:
            path: /proc
        - name: nodeexportertls
          secret:
            secretName: amazon-cloudwatch-observability-agent-cert
            items:
              - key: tls.crt
                path: server.crt
              - key: tls.key
                path: server.key
        - name: web-config
          configMap:
            name: {{ include "node-exporter.name" . }}-web-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "node-exporter.name" . }}-web-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
data:
  web.yml: |
    tls_server_config:
      cert_file: /etc/node-exporter-cert/server.crt
      key_file: /etc/node-exporter-cert/server.key
{{- end }}
