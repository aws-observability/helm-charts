{{- if .Values.agent.enabled }}
{{- include "cloudwatch-agent.validatePrometheusScrape" . -}}
{{- if and (.Values.agent.autoGenerateCert.enabled) (not .Values.agent.certManager.enabled) -}}
{{- $altNames := list ( printf "%s-service" (include "dcgm-exporter.name" .) ) ( printf "%s-service" (include "neuron-monitor.name" .) ) ( printf "%s-service.%s.svc" (include "dcgm-exporter.name" .) .Release.Namespace ) ( printf "%s-service.%s.svc" (include "neuron-monitor.name" .) .Release.Namespace ) ( printf "%s-service" (include "node-exporter.name" .) ) ( printf "%s-service.%s.svc" (include "node-exporter.name" .) .Release.Namespace ) ( include "kube-state-metrics.name" . ) ( printf "%s.%s.svc" (include "kube-state-metrics.name" .) .Release.Namespace ) -}}
{{- range $i, $customAgent := .Values.agents }}
{{ $altNames = append $altNames ( printf "%s-target-allocator-service" $customAgent.name )}}
{{- end }}
{{- $agentAltNames := list ( printf "%s" (include "cloudwatch-agent.name" .) ) ( printf "%s.%s.svc" (include "cloudwatch-agent.name" .) .Release.Namespace ) -}}
{{- $ca := genCA ("agent-ca")  ( .Values.agent.autoGenerateCert.expiryDays | int ) -}}
{{- $cert := genSignedCert ("agent") nil $altNames ( .Values.agent.autoGenerateCert.expiryDays | int ) $ca -}}
{{- $serverCert := genSignedCert ("agent-server") nil $agentAltNames ( .Values.agent.autoGenerateCert.expiryDays | int ) $ca -}}
{{- $clientCert := genSignedCert ("agent-client") nil nil ( .Values.agent.autoGenerateCert.expiryDays | int ) $ca -}}
{{- $agentTAClientCert := genSignedCert ("agent-ta-client") nil nil ( .Values.agent.autoGenerateCert.expiryDays | int ) $ca -}}
apiVersion: v1
kind: Secret
metadata:
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4}}
  name: "amazon-cloudwatch-observability-agent-cert"
  namespace: {{ .Release.Namespace }}
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
      {{- include "amazon-cloudwatch-observability.labels" . | nindent 4}}
  name: "amazon-cloudwatch-observability-agent-server-cert"
  namespace: {{ .Release.Namespace }}
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  tls.crt: {{ $serverCert.Cert | b64enc }}
  tls.key: {{ $serverCert.Key | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
      {{- include "amazon-cloudwatch-observability.labels" . | nindent 4}}
  name: "amazon-cloudwatch-observability-agent-client-cert"
  namespace: {{ .Release.Namespace }}
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  tls.crt: {{ $clientCert.Cert | b64enc }}
  tls.key: {{ $clientCert.Key | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  labels:
      {{- include "amazon-cloudwatch-observability.labels" . | nindent 4}}
  name: "amazon-cloudwatch-observability-agent-ta-client-cert"
  namespace: {{ .Release.Namespace }}
data:
  ca.crt: {{ $ca.Cert | b64enc }}
  tls.crt: {{ $agentTAClientCert.Cert | b64enc }}
  tls.key: {{ $agentTAClientCert.Key | b64enc }}
---
{{- end -}}

{{- $clusterName := .Values.clusterName | required ".Values.clusterName is required." -}}
{{- $region := .Values.region | required ".Values.region is required." -}}
{{- $isROSA := eq $.Values.k8sMode "ROSA" -}}
{{- $isAKS := eq $.Values.k8sMode "AKS" -}}
{{- if $isAKS }}{{- $_ := $.Values.roleArn | required ".Values.roleArn is required when k8sMode is AKS." -}}{{- end }}
{{- range .Values.agents }}
{{- $agent := mergeOverwrite (deepCopy $.Values.agent) . }}
{{/* Skip cluster-scraper agent when otelContainerInsights is disabled */}}
{{- if or $.Values.otelContainerInsights.enabled (ne $agent.name $.Values.otelContainerInsights.clusterScraperAgent) }}
apiVersion: cloudwatch.aws.amazon.com/v1alpha1
kind: AmazonCloudWatchAgent
metadata:
  name: {{ $agent.name | default (include "cloudwatch-agent.name" $) }}
  namespace: {{ $.Release.Namespace }}
spec:
  {{ template "cloudwatch-agent.updateStrategy" (dict "mode" $agent.mode) }}:
    type: {{ $agent.updateStrategy.type }}
    {{- if eq $agent.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ $agent.updateStrategy.rollingUpdate.maxUnavailable | default (include "cloudwatch-agent.rolloutStrategyMaxUnavailable" (dict "mode" $agent.mode)) }}
      maxSurge: {{ $agent.updateStrategy.rollingUpdate.maxSurge | default (include "cloudwatch-agent.rolloutStrategyMaxSurge" (dict "mode" $agent.mode)) }}
    {{- end }}
  image: {{ template "cloudwatch-agent.image" (merge $agent.image (dict "region" $.Values.region)) }}
  mode: {{ $agent.mode }}
  replicas: {{ $agent.replicas }}
  {{- with $agent.nodeSelector }}
  nodeSelector: {{- toYaml . | nindent 4 }}
  {{- end }}
  serviceAccount: {{ $agent.serviceAccount.name | default (include "cloudwatch-agent.serviceAccountName" $) }}
  {{ if $isROSA }}
  securityContext:
    runAsNonRoot: false
    capabilities:
      add:
        - SYS_ADMIN
  {{ end }}
  priorityClassName: {{ $agent.priorityClassName | default $.Values.agent.priorityClassName }}
  {{- with $agent.affinity }}
  affinity: {{- toYaml . | nindent 4 }}
  {{- end }}
  hostNetwork: {{ $agent.hostNetwork }}
  {{- if and $agent.config (ne ($agent.config | toString) "default") }}
  config: {{ include "cloudwatch-agent.modify-config" (merge (dict "Config" $agent.config) $ ) }}
  {{- else }}
  config: {{ include "cloudwatch-agent.modify-config" (merge (dict "Config" (include "cloudwatch-agent.build-default-config" (dict "agentName" $agent.name "context" $) | fromJson)) $ ) }}
  {{- end }}
  {{- $generatedOtelConfig := include "cloudwatch-agent.build-default-otel-config" (dict "agentName" $agent.name "context" $) -}}
  {{- if $agent.otelConfig }}
  otelConfig: {{ include "cloudwatch-agent.modify-otel-config" (merge (dict "OtelConfig" (include "cloudwatch-agent.merge-otel-configs" (dict "Base" $generatedOtelConfig "User" $agent.otelConfig))) $) }}
  {{- else if ne (trimAll " \n\t" $generatedOtelConfig) "{}" }}
  otelConfig: {{ include "cloudwatch-agent.modify-otel-config" (merge (dict "OtelConfig" $generatedOtelConfig) $) }}
  {{- end }}
  {{- $otelCIScrape := eq (include "cloudwatch-agent.otelCIScrapeEnabled" (dict "agentName" $agent.name "context" $)) "true" }}
  {{- $taEnabled := or $agent.prometheus.targetAllocator.enabled $otelCIScrape }}
  {{- $allocationStrategy := $agent.prometheus.targetAllocator.allocationStrategy | default "consistent-hashing" }}
  {{- if $otelCIScrape }}
  {{- $allocationStrategy = (dig "prometheusScrape" "allocationStrategy" "per-node" $.Values.otelContainerInsights) }}
  {{- end }}
  {{- if $agent.prometheus.config }}
  prometheus:
    {{- with $agent.prometheus.config }}
    config:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- else if $taEnabled }}
  # The operator builds the Target Allocator config from spec.prometheus and requires
  # a prometheus.config containing a scrape_configs key (see operator
  # targetallocator/adapters GetPromConfig). With prometheusCR (ServiceMonitor/
  # PodMonitor) discovery the static scrape list is empty -- the Target Allocator
  # discovers targets from ServiceMonitor/PodMonitor CRs.
  prometheus:
    config:
      scrape_configs: []
  {{- end }}
  {{- if $taEnabled }}
  targetAllocator:
    enabled: true
    image: {{ template "target-allocator.image" (merge $agent.prometheus.targetAllocator.image (dict "region" $.Values.region)) }}
    allocationStrategy: {{ $allocationStrategy | quote }}
    {{- if or $agent.prometheus.targetAllocator.prometheusCR.enabled $otelCIScrape }}
    prometheusCR:
      enabled: true
      {{- if $otelCIScrape }}
      scrapeInterval: {{ $.Values.otelContainerInsights.metricResolution | quote }}
      {{- if ne (include "cloudwatch-agent.serviceMonitorEnabled" $) "true" }}
      # serviceMonitor disabled: select a label no real ServiceMonitor
      # carries, so the Target Allocator discovers no ServiceMonitors.
      serviceMonitorSelector:
        amazon-cloudwatch-observability.aws/otel-ci-scrape: disabled
      {{- end }}
      {{- if ne (include "cloudwatch-agent.podMonitorEnabled" $) "true" }}
      # podMonitor disabled: select a label no real PodMonitor carries.
      podMonitorSelector:
        amazon-cloudwatch-observability.aws/otel-ci-scrape: disabled
      {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- $prunedResources := include "cloudwatch-agent.pruneNulls" $agent.resources | fromYaml }}
  {{- with $prunedResources }}
  resources: {{- toYaml . | nindent 4}}
  {{- end }}
  volumeMounts:
  - mountPath: /rootfs
    name: rootfs
    readOnly: true
  - mountPath: /var/run/docker.sock
    name: dockersock
    readOnly: true
  - mountPath: /run/containerd/containerd.sock
    name: containerdsock
  - mountPath: /var/run/crio/crio.sock
    name: criosock
    readOnly: true
  - mountPath: /var/lib/containers
    name: criocontainer
    readOnly: true
  - mountPath: /var/log/pods
    name: criologs
    readOnly: true
  {{- if and $.Values.otelContainerInsights.enabled $.Values.otelContainerInsights.logs.enabled (eq $agent.name $.Values.otelContainerInsights.targetAgent) }}
  # /var/log covers the paths the OTEL log pipelines need: /var/log/containers/*.log
  # (app container logs), /var/log/messages, /var/log/dmesg, /var/log/secure
  # (host logs). The existing criologs mount on /var/log/pods is retained for
  # the existing metrics pipelines.
  - mountPath: /var/log
    name: varlog
    readOnly: true
  {{- end }}
  - mountPath: /var/lib/docker
    name: varlibdocker
    readOnly: true
  - mountPath: /sys
    name: sys
    readOnly: true
  - mountPath: /dev/disk
    name: devdisk
    readOnly: true
  - mountPath: /etc/amazon-cloudwatch-observability-agent-cert
    name: agenttls
    readOnly: true
  - mountPath: /etc/amazon-cloudwatch-observability-agent-client-cert
    name: agentclienttls
    readOnly: true
  - mountPath: /etc/amazon-cloudwatch-observability-agent-server-cert
    name: agentservertls
    readOnly: true
  - mountPath: /etc/amazon-cloudwatch-observability-agent-ta-client-cert
    name: agenttaclienttls
    readOnly: true
  - mountPath: /var/lib/kubelet/pod-resources
    name: kubelet-podresources
    {{ if $isROSA }}
  - mountPath: /etc/kubernetes/kubelet-ca.crt
    name: kubelet-ca
    readOnly: true
    {{ end }}
    {{ if $isAKS }}
  - mountPath: /var/run/secrets/aws
    name: aws-iam-token
    readOnly: true
    {{ end }}
  volumes:
  - name: kubelet-podresources
    hostPath:
      path: /var/lib/kubelet/pod-resources
      type: Directory
  - name: rootfs
    hostPath:
      path: /
  - hostPath:
      path: /var/run/docker.sock
    name: dockersock
  - hostPath:
      path: /var/lib/docker
    name: varlibdocker
  - hostPath:
      path: /run/containerd/containerd.sock
    name: containerdsock
  - hostPath:
      path: /var/run/crio/crio.sock
    name: criosock
  - hostPath:
      path:  /var/lib/containers
    name: criocontainer
  - hostPath:
      path:  /var/log/pods
    name: criologs
  {{- if and $.Values.otelContainerInsights.enabled $.Values.otelContainerInsights.logs.enabled (eq $agent.name $.Values.otelContainerInsights.targetAgent) }}
  - hostPath:
      path: /var/log
    name: varlog
  {{- end }}
  - hostPath:
      path: /sys
    name: sys
  - hostPath:
      path: /dev/disk/
    name: devdisk
  - name: agenttls
    secret:
      secretName: amazon-cloudwatch-observability-agent-cert
      items:
        - key: ca.crt
          path: tls-ca.crt
  - name: agentclienttls
    secret:
      secretName: amazon-cloudwatch-observability-agent-client-cert
      items:
        - key: ca.crt
          path: tls-ca.crt
  - name: agentservertls
    secret:
      secretName: amazon-cloudwatch-observability-agent-server-cert
      items:
        - key: tls.crt
          path: server.crt
        - key: tls.key
          path: server.key
  - name: agenttaclienttls
    secret:
      secretName: amazon-cloudwatch-observability-agent-ta-client-cert
      items:
        - key: tls.crt
          path: client.crt
        - key: tls.key
          path: client.key
  {{ if $isROSA }}
  - name: kubelet-ca
    hostPath:
      path: /etc/kubernetes/kubelet-ca.crt
  {{end }}
  {{ if $isAKS }}
  - name: aws-iam-token
    projected:
      sources:
      - serviceAccountToken:
          audience: sts.amazonaws.com
          expirationSeconds: 3600
          path: token
  {{ end }}
  env:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: HOST_IP
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: HOST_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: K8S_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
  {{ if $isROSA }}
  - name: RUN_IN_ROSA
    value: "True"
  {{ end }}
  {{ if $isAKS }}
  - name: RUN_IN_AKS
    value: "True"
  - name: AWS_WEB_IDENTITY_TOKEN_FILE
    value: /var/run/secrets/aws/token
  - name: AWS_ROLE_ARN
    value: {{ $.Values.roleArn | quote }}
  {{ end }}
  - name: K8S_CLUSTER_NAME
    value: {{ $.Values.clusterName | quote }}
  {{- if $.Values.otelContainerInsights.enabled }}
  - name: OTEL_CI_VERSION
    value: "1.0.0"
  # POD_NAME is used as the Target Allocator collector_id by the prometheusCR
  # receiver (otel-container-insights.config) so each agent pulls its own shard.
  - name: POD_NAME
    valueFrom:
      fieldRef:
        fieldPath: metadata.name
  {{- end }}
  {{- with $agent.env }}
  {{- . | toYaml | nindent 2 }}
  {{- end }}
  {{- dict "component" $agent "context" $ | include "amazon-cloudwatch-observability.common.tolerations" | nindent 2 }}
---
{{- end }}{{/* end: render unless cluster-scraper with OTLP disabled */}}
{{- end }}
{{- end }}