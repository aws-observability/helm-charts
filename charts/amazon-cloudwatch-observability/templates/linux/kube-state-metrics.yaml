{{- if and .Values.kubeStateMetrics.enabled .Values.otelContainerInsights.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwagent-kube-state-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: cwagent-kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: cwagent-kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cwagent-kube-state-metrics
    spec:
      serviceAccountName: {{ template "amazon-cloudwatch-observability.name" . }}-ksm-service-account
      nodeSelector:
        kubernetes.io/os: linux
      {{- dict "component" .Values.kubeStateMetrics "context" . | include "amazon-cloudwatch-observability.common.tolerations" | nindent 6 }}
      containers:
        - name: kube-state-metrics
          image: {{ template "kube-state-metrics.image" . }}
          args:
            - --port=8443
            - --tls-config=/etc/ksm-web-config/web.yml
          ports:
            - name: https-metrics
              containerPort: 8443
              protocol: TCP
            - name: telemetry
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8081
              scheme: HTTPS
            initialDelaySeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.kubeStateMetrics.resources | nindent 12 }}
          volumeMounts:
            - name: ksm-tls
              mountPath: /etc/ksm-cert
              readOnly: true
            - name: ksm-web-config
              mountPath: /etc/ksm-web-config
              readOnly: true
      volumes:
        - name: ksm-tls
          secret:
            secretName: amazon-cloudwatch-observability-agent-cert
            items:
              - key: tls.crt
                path: server.crt
              - key: tls.key
                path: server.key
        - name: ksm-web-config
          configMap:
            name: {{ template "amazon-cloudwatch-observability.name" . }}-ksm-web-config
---
apiVersion: v1
kind: Service
metadata:
  name: cwagent-kube-state-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: cwagent-kube-state-metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8443"
spec:
  type: ClusterIP
  ports:
    - name: https-metrics
      port: 8443
      targetPort: https-metrics
      protocol: TCP
  selector:
    app.kubernetes.io/component: cwagent-kube-state-metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "amazon-cloudwatch-observability.name" . }}-ksm-web-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
data:
  web.yml: |
    tls_server_config:
      cert_file: /etc/ksm-cert/server.crt
      key_file: /etc/ksm-cert/server.key
{{- end }}
