{{- if and .Values.kubeStateMetrics.enabled .Values.otelContainerInsights.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ template "kube-state-metrics.name" . }}-cluster-role-binding
  labels:
    {{- include "amazon-cloudwatch-observability.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ template "kube-state-metrics.name" . }}-cluster-role
subjects:
  - kind: ServiceAccount
    name: {{ template "kube-state-metrics.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
