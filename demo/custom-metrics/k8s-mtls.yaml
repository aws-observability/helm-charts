apiVersion: v1
kind: Namespace
metadata:
  name: orders-team
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-demo
  namespace: orders-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service-demo
  template:
    metadata:
      labels:
        app: order-service-demo
    spec:
      containers:
        - name: order-service
          image: 322962300869.dkr.ecr.us-east-1.amazonaws.com/custom-metrics-demo:latest
          imagePullPolicy: Always
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://container-insights-otlp.amazon-cloudwatch:4319"
            - name: OTEL_EXPORTER_OTLP_CERTIFICATE
              value: "/var/run/secrets/otlp/ca.crt"
            - name: OTEL_EXPORTER_OTLP_CLIENT_CERTIFICATE
              value: "/var/run/secrets/otlp/tls.crt"
            - name: OTEL_EXPORTER_OTLP_CLIENT_KEY
              value: "/var/run/secrets/otlp/tls.key"
          volumeMounts:
            - name: otlp-certs
              mountPath: /var/run/secrets/otlp
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: otlp-certs
          secret:
            secretName: container-insights-otlp-client
            items:
              - key: ca.crt
                path: ca.crt
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
